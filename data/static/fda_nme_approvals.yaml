# FDA novel drug approvals — new molecular entities (NMEs) and new biologics
# approved by CDER (Center for Drug Evaluation and Research) each calendar year.
#
# Source: FDA CDER "Novel Drug Approvals" annual summary page.
#   https://www.fda.gov/drugs/new-drugs-fda-cders-new-molecular-entities-and-new-therapeutic-biological-products
# UPDATE ANNUALLY (around Feb each year, once FDA publishes the prior-year summary).

last_updated: "2026-06-12"
unit: "approvals per year"
sources:
  "FDA CDER": "Annual Novel Drug Approvals summary (FDA.gov)"
notes: |
  Counts include both new molecular entities and new biologic license applications
  approved by CDER. Does not include CBER biologics, generics, or supplements.
  CDER began publishing the consolidated annual "Novel Drug Approvals" report in 2015;
  figures for 2000–2014 are NME/new-BLA counts compiled from FDA historical summaries
  and may differ slightly from later-revised tallies — verify before citing externally.
  2025 figure (46 = 34 NMEs + 12 new biologics) confirmed against CDER's final
  "New Drug Therapy Approvals 2025" report (published Jan 2026).

