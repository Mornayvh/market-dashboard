name: Weekly Report Email

on:
  schedule:
    # Runs at 07:00 UTC every Saturday
    # 07:00 UTC = 09:00 SAST
    - cron: '0 7 * * 6'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Send weekly report
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          python weekly_report_email.py

  refresh-fundamentals:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # allow committing the refreshed DB back to the repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Refresh SEC fundamentals
        env:
          # SEC requires a descriptive User-Agent; secret overrides the default contact.
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'Secco Capital mornay@seccocapital.com' }}
        run: |
          python refresh_fundamentals.py

      - name: Commit refreshed DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/fundamentals.db
          if git diff --staged --quiet; then
            echo "No fundamentals changes to commit."
          else
            git commit -m "chore: weekly SEC fundamentals refresh [skip ci]"
            git push
          fi
