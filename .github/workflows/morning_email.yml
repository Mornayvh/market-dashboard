name: Morning Market Email

on:
  schedule:
    # Runs at 06:30 UTC every weekday (Mon-Fri)
    # Adjust for your timezone: 06:30 UTC = 08:30 SAST
    - cron: '30 6 * * 1-5'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install streamlit yfinance pandas plotly requests

      - name: Send morning email
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          python morning_email.py
